# PyParrot Chat botLocal Configuration
# Usage: pyparrot configure chatbot --config examples/chatbot.yaml

# Pipeline Configuration
type: dialog
backends: local

# Backend Configuration (local mode)
stt_backend_engine: faster-whisper
stt_backend_model: large-v2
stt_backend_gpu: "1"
tts_backend_engine: tts-kokoro
tts_backend_gpu: "1"
llm_backend_engine: huggingface-tgi
llm_backend_model: google/gemma-3-12b-it
llm_backend_gpu: "4"

# Network Configuration
domain: chat.localhost
port: 8009

# Frontend Configuration
website_theme: defaulttheme

# Development
debug: false


chat_bots_config_dir: ./chatbot_config
